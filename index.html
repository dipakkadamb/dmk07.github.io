<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dipak Kadam | AI & Zoho Solutions Architect</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0B1120',    /* Deep Navy */
                            card: '#1E293B',    /* Slate Card */
                            primary: '#38bdf8', /* Sky Blue */
                            accent: '#818cf8',  /* Indigo */
                            zoho: '#22c55e',    /* Success Green */
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B1120; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-nav {
            background: rgba(11, 17, 32, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Text Gradient */
        .text-gradient {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-brand-dark text-slate-300 antialiased selection:bg-brand-primary selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* --- ICONS (FontAwesome Wrapper) --- */
        const Icon = ({ name, color }) => <i className={`fas fa-${name} ${color ? color : ''}`}></i>;

        /* --- NAVBAR --- */
        const Navbar = () => (
            <nav className="fixed w-full z-50 glass-nav transition-all duration-300">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                    <div className="text-2xl font-bold text-white tracking-tight">
                        Dipak<span className="text-brand-primary">.dev</span>
                    </div>
                    <div className="hidden md:flex space-x-8 text-sm font-medium">
                        {['Expertise', 'Work', 'Experience', 'Contact'].map((item) => (
                            <a key={item} href={`#${item.toLowerCase()}`} className="hover:text-brand-primary transition-colors">
                                {item}
                            </a>
                        ))}
                    </div>
                    <a href="#contact" className="px-5 py-2.5 bg-brand-primary/10 text-brand-primary border border-brand-primary/20 rounded-full hover:bg-brand-primary hover:text-white transition-all text-sm font-semibold">
                        Hire Me
                    </a>
                </div>
            </nav>
        );

        /* --- HERO --- */
        const Hero = () => (
            <section className="relative min-h-screen flex items-center pt-20 overflow-hidden">
                {/* Background Decor */}
                <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-primary/20 rounded-full blur-[120px] -z-10 animate-pulse-slow"></div>
                <div className="absolute bottom-0 left-0 w-[500px] h-[500px] bg-brand-accent/20 rounded-full blur-[120px] -z-10"></div>

                <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center w-full">
                    
                    {/* Text Content */}
                    <div className="space-y-8">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-card border border-slate-700 text-xs font-semibold text-brand-primary">
                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            Available for new projects
                        </div>
                        
                        <h1 className="text-5xl lg:text-7xl font-extrabold text-white leading-tight">
                            Smart Logic.<br />
                            <span className="text-gradient">Real Results.</span>
                        </h1>
                        
                        <p className="text-lg text-slate-400 max-w-lg leading-relaxed">
                            [cite_start]I'm <strong className="text-white">Dipak Kadam</strong>[cite: 10]. [cite_start]A Pune-based AI Architect & Zoho Specialist[cite: 11]. 
                            I don't just write code; [cite_start]I build <span className="text-white">intelligent automated systems</span> that save businesses time and money[cite: 13, 17].
                        </p>

                        <div className="flex flex-wrap gap-4">
                            <a href="#contact" className="px-8 py-4 bg-gradient-to-r from-brand-primary to-brand-accent text-white rounded-full font-bold shadow-lg shadow-brand-primary/25 hover:shadow-brand-primary/40 transition-all transform hover:-translate-y-1">
                                Let's Discuss Your Project
                            </a>
                            <a href="https://github.com/dmk07" target="_blank" className="px-8 py-4 glass text-white rounded-full font-bold hover:bg-white/5 transition-all flex items-center gap-2">
                                <Icon name="github" /> GitHub
                            </a>
                        </div>
                        
                        <div className="flex items-center gap-6 pt-4 text-sm font-medium text-slate-500">
                            <div className="flex items-center gap-2"><Icon name="check-circle" color="text-brand-zoho" /> Zoho Certified Expert</div>
                            <div className="flex items-center gap-2"><Icon name="check-circle" color="text-brand-zoho" /> AI Integration</div>
                        </div>
                    </div>

                    {/* Image / Visual */}
                    <div className="relative flex justify-center lg:justify-end animate-float">
                        <div className="relative w-72 h-72 lg:w-96 lg:h-96">
                            <div className="absolute inset-0 bg-gradient-to-tr from-brand-primary to-brand-accent rounded-[2rem] rotate-6 opacity-50 blur-lg"></div>
                            <div className="absolute inset-0 bg-brand-card rounded-[2rem] border border-white/10 overflow-hidden shadow-2xl">
                                <img 
                                    src="https://media.licdn.com/dms/image/v2/D4D03AQFKqJrszhUq_Q/profile-displayphoto-scale_200_200/B4DZtXD3uGGUAY-/0/1766692192684?e=1770854400&v=beta&t=UuzW-Xz8WIE8ksCJVM4A5gH5ehc8SFW4dpWPyObffaE" 
                                    alt="Dipak Kadam" 
                                    className="w-full h-full object-cover"
                                />
                            </div>
                            
                            {/* Floating Badge 1 */}
                            <div className="absolute -left-8 top-12 glass p-4 rounded-xl shadow-xl flex items-center gap-3 animate-bounce">
                                <div className="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center text-blue-400">
                                    <Icon name="code" />
                                </div>
                                <div>
                                    <div className="text-xs text-slate-400">Core Skill</div>
                                    <div className="text-sm font-bold text-white">React & AI</div>
                                </div>
                            </div>

                            {/* Floating Badge 2 */}
                            <div className="absolute -right-4 bottom-12 glass p-4 rounded-xl shadow-xl flex items-center gap-3 animate-pulse">
                                <div className="w-10 h-10 bg-green-500/20 rounded-lg flex items-center justify-center text-green-400">
                                    <Icon name="project-diagram" />
                                </div>
                                <div>
                                    <div className="text-xs text-slate-400">Specialist</div>
                                    <div className="text-sm font-bold text-white">Zoho Auto</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        /* --- TECH STACK (Marquee) --- */
        const TechStack = () => (
            <div className="py-10 border-y border-white/5 bg-brand-card/30 overflow-hidden">
                <div className="max-w-7xl mx-auto px-6">
                    <p className="text-center text-sm font-semibold text-slate-500 mb-6 uppercase tracking-wider">Powering applications with modern tech</p>
                    <div className="flex justify-center flex-wrap gap-8 opacity-70 grayscale hover:grayscale-0 transition-all duration-500">
                        {['Zoho CRM', 'React.js', 'OpenAI API', 'Python', 'Tailwind', 'Linux', 'AWS', 'JavaScript'].map((tech) => (
                            <span key={tech} className="text-xl font-bold text-slate-400 flex items-center gap-2">
                                <Icon name="bolt" /> {tech}
                            </span>
                        ))}
                    </div>
                </div>
            </div>
        );

        /* --- SERVICES / EXPERTISE --- */
        const Expertise = () => {
            const services = [
                {
                    icon: "robot",
                    title: "AI & Web Apps",
                    [cite_start]desc: "I build responsive websites that don't just look good—they think. Integration with ChatGPT APIs and automated chatbots[cite: 19, 32].",
                    tags: ["React", "AI Integration", "Automation"]
                },
                {
                    icon: "network-wired",
                    title: "Zoho Integration",
                    desc: "Seamlessly connecting your website to Zoho CRM, Flow, and Creator. [cite_start]I automate lead capture and complex workflows[cite: 16, 25].",
                    tags: ["Zoho CRM", "Deluge", "Webhooks"]
                },
                {
                    icon: "server",
                    title: "IT Infrastructure",
                    desc: "Solid background in System Engineering. [cite_start]I ensure your servers (Linux/Windows) are secure, scalable, and fast[cite: 53, 55].",
                    tags: ["Security", "Linux", "DevOps"]
                }
            ];

            return (
                <section id="expertise" className="py-24 relative">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-5xl font-bold text-white mb-4">How I add value</h2>
                            <p className="text-slate-400 max-w-2xl mx-auto">I bridge the gap between complex code and business goals.</p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8">
                            {services.map((s, i) => (
                                <div key={i} className="glass p-8 rounded-2xl hover:bg-white/5 transition-all group">
                                    <div className="w-14 h-14 bg-brand-primary/10 rounded-xl flex items-center justify-center text-2xl text-brand-primary mb-6 group-hover:scale-110 transition-transform">
                                        <Icon name={s.icon} />
                                    </div>
                                    <h3 className="text-xl font-bold text-white mb-3">{s.title}</h3>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-6">{s.desc}</p>
                                    <div className="flex flex-wrap gap-2">
                                        {s.tags.map(t => (
                                            <span key={t} className="text-xs font-medium px-2.5 py-1 rounded-md bg-white/5 text-slate-300 border border-white/5">
                                                {t}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        /* --- EXPERIENCE TIMELINE --- */
        const Experience = () => {
            const jobs = [
                {
                    role: "AI Web Developer",
                    company: "ZM Technologies",
                    period: "Sep 2025 - Present",
                    desc: "Leading web app development and AI-tool integration. Automating business processes via Zoho Ecosystem."
                },
                {
                    role: "System Engineer",
                    company: "Royaltech",
                    period: "Apr 2025 - Sep 2025",
                    desc: "Designed scalable Windows/Linux environments. Implemented Grafana monitoring for 99.9% uptime."
                },
                {
                    role: "IT Administrator",
                    company: "SKS Engineering Solutions",
                    period: "Jul 2024 - Mar 2025",
                    desc: "Managed enterprise infrastructure, security protocols, and disaster recovery operations."
                }
            ];

            return (
                <section id="experience" className="py-24 bg-brand-card/20">
                    <div className="max-w-4xl mx-auto px-6">
                        <h2 className="text-3xl font-bold text-white mb-12 text-center">Professional Journey</h2>
                        <div className="space-y-8">
                            {jobs.map((job, i) => (
                                <div key={i} className="glass p-8 rounded-2xl flex flex-col md:flex-row gap-6 hover:border-brand-primary/50 transition-colors">
                                    <div className="md:w-1/4">
                                        <div className="text-brand-primary font-bold text-lg">{job.company}</div>
                                        <div className="text-xs text-slate-500 font-mono mt-1">{job.period}</div>
                                    </div>
                                    <div className="md:w-3/4 border-l border-white/10 md:pl-6 pl-0 md:border-l-0 border-t md:border-t-0 pt-4 md:pt-0">
                                        <h3 className="text-xl font-bold text-white mb-2">{job.role}</h3>
                                        <p className="text-slate-400 text-sm leading-relaxed">{job.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        /* --- CONTACT --- */
        const Contact = () => (
            <section id="contact" className="py-24 relative overflow-hidden">
                <div className="max-w-3xl mx-auto px-6 text-center">
                    <h2 className="text-4xl lg:text-5xl font-bold text-white mb-6">Let's work together.</h2>
                    <p className="text-lg text-slate-400 mb-10">
                        [cite_start]Whether you need a complex Zoho integration, an AI-powered website, or robust IT support, I'm ready to deliver[cite: 13, 17].
                    </p>
                    
                    <div className="grid md:grid-cols-2 gap-6">
                        <a href="mailto:dipak100kadam@gmail.com" className="group glass p-6 rounded-xl hover:bg-brand-primary hover:border-brand-primary transition-all">
                            <div className="text-2xl text-brand-primary group-hover:text-white mb-2"><Icon name="envelope" /></div>
                            [cite_start]<div className="text-white font-bold">dipak100kadam@gmail.com [cite: 2]</div>
                            <div className="text-xs text-slate-400 group-hover:text-white/80 mt-1">Email Me</div>
                        </a>
                        <a href="tel:7057807659" className="group glass p-6 rounded-xl hover:bg-brand-accent hover:border-brand-accent transition-all">
                            <div className="text-2xl text-brand-accent group-hover:text-white mb-2"><Icon name="phone" /></div>
                            [cite_start]<div className="text-white font-bold">+91 7057 807 659 [cite: 2]</div>
                            <div className="text-xs text-slate-400 group-hover:text-white/80 mt-1">Call Me</div>
                        </a>
                    </div>
                    
                    <div className="mt-12 pt-8 border-t border-white/10 text-slate-500 text-sm">
                        &copy; 2026 Dipak Kadam. [cite_start]Pune, Maharashtra[cite: 11]. All Rights Reserved.
                    </div>
                </div>
            </section>
        );

        const App = () => (
            <React.Fragment>
                <Navbar />
                <Hero />
                <TechStack />
                <Expertise />
                <Experience />
                <Contact />
            </React.Fragment>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
