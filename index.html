<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMK07 | AI Engineer & Architect</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CORE ESTHETICS --- */
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --primary: #00f3ff; /* Cyan Neon */
            --secondary: #bd00ff; /* Purple Math */
            --text-main: #e0e0e0;
            --text-dim: #6b7280;
            --grid-line: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* Graph Paper Background Effect */
        .math-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
        }

        /* Canvas for Particles */
        #neural-network {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* --- REACT CONTAINER LAYOUT --- */
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- TYPOGRAPHY --- */
        .font-mono { font-family: 'Fira Code', monospace; }
        .text-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- LAYOUT COMPONENTS --- */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            background: rgba(10, 10, 10, 0.8);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* Circle */
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            position: relative;
            z-index: 2;
        }

        /* Orbit Animation */
        .orbit {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid rgba(189, 0, 255, 0.3);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }
        .orbit::after {
            content: ''; position: absolute; top: 50%; right: -4px;
            width: 8px; height: 8px; background: var(--secondary);
            border-radius: 50%; box-shadow: 0 0 10px var(--secondary);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            text-align: left;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            transition: 0.3s;
            border-radius: 8px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(0, 243, 255, 0.05);
            color: var(--primary);
            border-color: rgba(0, 243, 255, 0.2);
            padding-left: 20px;
        }

        /* Content Area */
        .content-area {
            padding: 50px;
            overflow-y: auto;
            position: relative;
        }

        /* Cards */
        .card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        /* Skill Tags */
        .skill-tag {
            display: inline-block;
            padding: 5px 12px;
            margin: 4px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.1);
            color: var(--primary);
            font-size: 0.8rem;
            font-family: 'Fira Code', monospace;
            border-radius: 4px;
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; height: auto; }
            .sidebar { position: relative; padding: 20px; flex-direction: row; flex-wrap: wrap; align-items: center; }
            .profile-img-container { margin: 0 20px 0 0; width: 80px; height: 80px; }
            .nav-menu { display: flex; overflow-x: auto; gap: 10px; width: 100%; margin-top: 20px; }
            .nav-btn { white-space: nowrap; }
            .orbit { display: none; }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="math-grid"></div>
    <canvas id="neural-network"></canvas>
    
    <div id="root"></div>

    <script type="text/babel">
        
        const { useState, useEffect, useRef } = React;

        // --- PARTICLE BACKGROUND COMPONENT ---
        const ParticleBackground = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                // Particle Logic
                const particles = [];
                const particleCount = 60; // Number of nodes

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.vx = (Math.random() - 0.5) * 0.5;
                        this.vy = (Math.random() - 0.5) * 0.5;
                        this.size = Math.random() * 2 + 1;
                    }

                    update() {
                        this.x += this.vx;
                        this.y += this.vy;
                        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                    }

                    draw() {
                        ctx.fillStyle = '#00f3ff';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let i = 0; i < particleCount; i++) particles.push(new Particle());

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    particles.forEach((p, index) => {
                        p.update();
                        p.draw();
                        
                        // Draw Connections (Neural Lines)
                        for (let j = index; j < particles.length; j++) {
                            const dx = p.x - particles[j].x;
                            const dy = p.y - particles[j].y;
                            const distance = Math.sqrt(dx * dx + dy * dy);

                            if (distance < 150) {
                                ctx.beginPath();
                                ctx.strokeStyle = `rgba(0, 243, 255, ${1 - distance / 150})`;
                                ctx.lineWidth = 0.5;
                                ctx.moveTo(p.x, p.y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    });
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    window.removeEventListener('resize', resizeCanvas);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} id="neural-network" style={{position:'fixed', top:0, left:0, zIndex:-1, opacity:0.4}} />;
        };

        // --- COMPONENTS ---

        const Sidebar = ({ activeTab, setActiveTab }) => {
            return (
                <aside class="sidebar">
                    <div style={{textAlign: 'center', width: '100%'}}>
                        <div class="profile-img-container">
                            <div class="orbit"></div>
                            <img src="https://media.licdn.com/dms/image/v2/D4D03AQFKqJrszhUq_Q/profile-displayphoto-scale_200_200/B4DZtXD3uGGUAY-/0/1766692192684?e=1770854400&v=beta&t=UuzW-Xz8WIE8ksCJVM4A5gH5ehc8SFW4dpWPyObffaE" alt="DMK07" class="profile-img" />
                        </div>
                        <h2 class="font-mono" style={{fontSize: '1.5rem', marginBottom: '5px'}}>DMK07</h2>
                        <p style={{color: 'var(--text-dim)', fontSize: '0.9rem', marginBottom: '30px'}}>
                            &lt;AI_Architect /&gt;
                        </p>
                    </div>

                    <nav class="nav-menu">
                        {['overview', 'stack', 'experience', 'projects'].map((tab) => (
                            <button 
                                key={tab}
                                className={`nav-btn ${activeTab === tab ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab)}
                            >
                                <i className={`fas fa-${tab === 'overview' ? 'cube' : tab === 'stack' ? 'code' : tab === 'experience' ? 'history' : 'project-diagram'}`} style={{marginRight:'10px'}}></i>
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </nav>

                    <div style={{marginTop: 'auto', textAlign: 'center'}}>
                        <div style={{display: 'flex', justifyContent: 'center', gap: '15px', fontSize: '1.2rem'}}>
                            <a href="https://github.com/dmk07" style={{color: 'var(--text-main)'}}><i class="fab fa-github"></i></a>
                            <a href="#" style={{color: 'var(--text-main)'}}><i class="fab fa-linkedin"></i></a>
                            <a href="#" style={{color: 'var(--text-main)'}}><i class="fas fa-envelope"></i></a>
                        </div>
                    </div>
                </aside>
            );
        };

        const Overview = () => (
            <div className="animate-fade-in">
                <h1 style={{fontSize: '3rem', fontWeight: '700', lineHeight: '1.1', marginBottom: '20px'}}>
                    Solving Problems with <br/>
                    <span class="text-gradient">Algorithmic Precision</span>
                </h1>
                <p style={{fontSize: '1.1rem', color: 'var(--text-dim)', maxWidth: '600px', lineHeight: '1.8'}}>
                    I operate at the intersection of <strong>Artificial Intelligence</strong>, <strong>Web Development</strong>, and <strong>Enterprise Automation</strong>. 
                    I don't just write code; I design intelligent systems that learn, adapt, and scale.
                </p>

                <div style={{marginTop: '40px', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '20px'}}>
                    <div class="card">
                        <i class="fas fa-brain text-gradient" style={{fontSize: '2rem', marginBottom: '15px'}}></i>
                        <h3 class="font-mono">AI Integration</h3>
                        <p style={{fontSize: '0.9rem', color: 'var(--text-dim)', marginTop:'10px'}}>LLMs, Chatbots, and Predictive Models embedded into web infrastructure.</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-network-wired text-gradient" style={{fontSize: '2rem', marginBottom: '15px'}}></i>
                        <h3 class="font-mono">Zoho Architecture</h3>
                        <p style={{fontSize: '0.9rem', color: 'var(--text-dim)', marginTop:'10px'}}>Advanced Deluge scripting, API Webhooks, and CRM automation.</p>
                    </div>
                </div>
            </div>
        );

        const Stack = () => (
            <div>
                <h2 class="font-mono" style={{marginBottom: '30px', borderBottom: '1px solid var(--grid-line)', paddingBottom: '10px'}}>// Technical_Stack</h2>
                
                <div class="card">
                    <h3 style={{marginBottom: '15px', color: 'var(--primary)'}}>Frontend & Interface</h3>
                    <div>
                        {['React.js', 'JavaScript (ES6+)', 'HTML5 / CSS3', 'Tailwind', 'Responsive Design'].map(s => <span key={s} class="skill-tag">{s}</span>)}
                    </div>
                </div>

                <div class="card">
                    <h3 style={{marginBottom: '15px', color: 'var(--secondary)'}}>AI & Automation</h3>
                    <div>
                        {['Zoho CRM', 'Zoho Flow', 'Deluge', 'OpenAI API', 'GitHub Copilot', 'Webhooks'].map(s => <span key={s} class="skill-tag">{s}</span>)}
                    </div>
                </div>

                <div class="card">
                    <h3 style={{marginBottom: '15px', color: '#fff'}}>Infrastructure</h3>
                    <div>
                        {['Linux Systems', 'Windows Server', 'Python', 'Zabbix', 'Security Protocols'].map(s => <span key={s} class="skill-tag">{s}</span>)}
                    </div>
                </div>
            </div>
        );

        const Experience = () => (
            <div>
                <h2 class="font-mono" style={{marginBottom: '30px', borderBottom: '1px solid var(--grid-line)', paddingBottom: '10px'}}>// Career_Timeline</h2>
                
                <div class="card">
                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                        <h3 class="font-mono" style={{color: 'var(--primary)'}}>AI Web Developer</h3>
                        <span class="font-mono" style={{fontSize: '0.8rem', opacity: 0.7}}>2025 - Present</span>
                    </div>
                    <h4 style={{marginBottom: '10px'}}>ZM Technologies</h4>
                    <ul style={{listStyle: 'none', color: 'var(--text-dim)', fontSize: '0.9rem'}}>
                        <li style={{marginBottom: '5px'}}>+ Developing AI-infused web applications.</li>
                        <li style={{marginBottom: '5px'}}>+ Architecting complex Zoho-to-Web integrations via REST APIs.</li>
                        <li style={{marginBottom: '5px'}}>+ Automating lead capture and business workflows.</li>
                    </ul>
                </div>

                <div class="card">
                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                        <h3 class="font-mono" style={{color: 'var(--secondary)'}}>System Engineer</h3>
                        <span class="font-mono" style={{fontSize: '0.8rem', opacity: 0.7}}>Apr 2025 - Sep 2025</span>
                    </div>
                    <h4 style={{marginBottom: '10px'}}>Royaltech</h4>
                    <ul style={{listStyle: 'none', color: 'var(--text-dim)', fontSize: '0.9rem'}}>
                        <li style={{marginBottom: '5px'}}>+ Designed high-availability Windows/Linux environments.</li>
                        <li style={{marginBottom: '5px'}}>+ Implemented Grafana monitoring and Python automation scripts.</li>
                    </ul>
                </div>

                <div class="card">
                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                        <h3 class="font-mono">IT Administrator</h3>
                        <span class="font-mono" style={{fontSize: '0.8rem', opacity: 0.7}}>2024 - 2025</span>
                    </div>
                    <h4 style={{marginBottom: '10px'}}>SKS Engineering</h4>
                    <p style={{fontSize: '0.9rem', color: 'var(--text-dim)'}}>Managed enterprise infrastructure, security patching, and disaster recovery.</p>
                </div>
            </div>
        );

        const Projects = () => (
            <div>
                <h2 class="font-mono" style={{marginBottom: '30px', borderBottom: '1px solid var(--grid-line)', paddingBottom: '10px'}}>// Selected_Works</h2>
                <div style={{textAlign: 'center', padding: '50px', color: 'var(--text-dim)'}}>
                    <i class="fas fa-code-branch" style={{fontSize: '3rem', marginBottom: '20px', opacity: 0.3}}></i>
                    <p>Check my GitHub for the latest repositories and code snippets.</p>
                    <br/>
                    <a href="https://github.com/dmk07" class="skill-tag" style={{padding: '10px 20px', fontSize: '1rem'}}>github.com/dmk07</a>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');

            return (
                <div className="main-layout">
                    <ParticleBackground />
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main className="content-area">
                        {activeTab === 'overview' && <Overview />}
                        {activeTab === 'stack' && <Stack />}
                        {activeTab === 'experience' && <Experience />}
                        {activeTab === 'projects' && <Projects />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
