<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dipak Kadam | AI Architect & Zoho Specialist</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --bg-deep: #050505;
            --bg-card: rgba(20, 20, 25, 0.7);
            --accent-primary: #00f0ff; /* Cyan (AI) */
            --accent-secondary: #7000ff; /* Violet (Math) */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.1);
            --font-tech: 'JetBrains Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        /* --- BACKGROUND EFFECTS --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000000 100%);
        }

        /* --- LAYOUT UTILITIES --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .section-padding { padding: 100px 0; }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-family: var(--font-body); font-weight: 800; letter-spacing: -0.05em; }
        .mono { font-family: var(--font-tech); color: var(--accent-primary); font-size: 0.9rem; }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- COMPONENTS --- */
        
        /* Glass Card */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 32px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 30px -10px rgba(0, 240, 255, 0.15);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glass);
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .nav-link:hover { color: var(--accent-primary); }

        /* Hero Image */
        .profile-orbit {
            width: 280px; height: 280px;
            position: relative;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(var(--accent-primary), var(--accent-secondary));
            animation: pulse-glow 3s infinite alternate;
        }

        .profile-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-deep);
            background: #111;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); }
            to { box-shadow: 0 0 50px rgba(112, 0, 255, 0.4); }
        }

        /* Timeline */
        .timeline-item {
            position: relative;
            padding-left: 40px;
            margin-bottom: 50px;
            border-left: 2px solid var(--border-glass);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px; top: 0;
            width: 16px; height: 16px;
            background: var(--bg-deep);
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
        }

        /* Skills Tags */
        .skill-tag {
            display: inline-block;
            padding: 6px 14px;
            margin: 0 8px 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            border-radius: 4px;
            font-family: var(--font-tech);
            font-size: 0.8rem;
            color: var(--accent-primary);
        }

        /* Mobile Adjustments */
        @media(max-width: 768px) {
            h1 { font-size: 2.5rem !important; }
            .profile-orbit { width: 200px; height: 200px; margin-bottom: 40px; }
            .hero-content { flex-direction: column-reverse; text-align: center; }
            .timeline-item { padding-left: 20px; }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- PARTICLE BACKGROUND (The Math/AI Visual) --- */
        const NeuralBackground = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width, height;
                let particles = [];

                const resize = () => {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                class Particle {
                    constructor() {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.vx = (Math.random() - 0.5) * 0.5;
                        this.vy = (Math.random() - 0.5) * 0.5;
                    }
                    update() {
                        this.x += this.vx;
                        this.y += this.vy;
                        if (this.x < 0 || this.x > width) this.vx *= -1;
                        if (this.y < 0 || this.y > height) this.vy *= -1;
                    }
                }

                for(let i=0; i<70; i++) particles.push(new Particle());

                const animate = () => {
                    ctx.clearRect(0,0,width,height);
                    ctx.fillStyle = '#00f0ff';
                    ctx.strokeStyle = 'rgba(112, 0, 255, 0.15)'; // Purple lines

                    particles.forEach((p, i) => {
                        p.update();
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
                        ctx.fill();

                        // Connect particles (Graph Theory Visual)
                        for(let j=i+1; j<particles.length; j++) {
                            const p2 = particles[j];
                            const dist = Math.hypot(p.x-p2.x, p.y-p2.y);
                            if(dist < 120) {
                                ctx.beginPath();
                                ctx.moveTo(p.x, p.y);
                                ctx.lineTo(p2.x, p2.y);
                                ctx.stroke();
                            }
                        }
                    });
                    requestAnimationFrame(animate);
                };
                animate();
            }, []);

            return <div id="canvas-container"><canvas ref={canvasRef} /></div>;
        };

        /* --- HEADER --- */
        const Navbar = () => (
            <nav>
                <div className="container" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>

                        DMK<span style={{color:'var(--accent-primary)'}}>07</span>
                    </div>
                    <div className="nav-links">
                        <a href="#about" className="nav-link">About</a>
                        <a href="#skills" className="nav-link">Stack</a>
                        <a href="#experience" className="nav-link">Experience</a>
                        <a href="#contact" className="nav-link" style={{color:'var(--accent-primary)'}}>Contact</a>
                    </div>
                </div>
            </nav>
        );

        /* --- HERO SECTION --- */
        const Hero = () => (
            <section style={{minHeight:'100vh', display:'flex', alignItems:'center', paddingTop:'80px'}}>
                <div className="container hero-content" style={{display:'flex', alignItems:'center', gap:'50px'}}>
                    <div style={{flex:1}}>
                        <div className="mono" style={{marginBottom:'10px'}}>
                            &lt;Hello_World /&gt; I am
                        </div>
                        <h1 style={{fontSize:'4rem', lineHeight:'1.1', marginBottom:'20px'}}>
                            Dipak Kadam
                        </h1>
                        <h2 style={{fontSize:'1.5rem', color:'var(--text-muted)', marginBottom:'30px', fontWeight:'400'}}>
                            <span className="gradient-text">AI Architect</span> & <span className="gradient-text">Zoho Specialist</span>
                        </h2>
                        <p style={{fontSize:'1.1rem', color:'var(--text-muted)', lineHeight:'1.8', maxWidth:'600px', marginBottom:'40px'}}>
                            Merging mathematical logic with modern web technologies. I build intelligent automated systems, 
                            scalable web applications, and secure IT infrastructure.
                        </p>
                        <div style={{display:'flex', gap:'20px'}}>
                            <a href="#contact" style={{

                                fontWeight:'700', borderRadius:'50px', textDecoration:'none'
                            }}>
                                Hire Me
                            </a>
                            <a href="https://github.com/dmk07" target="_blank" style={{
                                padding:'12px 30px', border:'1px solid var(--border-glass)', color:'#fff', 
                                borderRadius:'50px', textDecoration:'none'
                            }}>
                                <i className="fab fa-github"></i> GitHub
                            </a>
                        </div>
                    </div>
                    
                    <div>
                        <div className="profile-orbit">
                            <img src="https://media.licdn.com/dms/image/v2/D4D03AQFKqJrszhUq_Q/profile-displayphoto-scale_200_200/B4DZtXD3uGGUAY-/0/1766692192684?e=1770854400&v=beta&t=UuzW-Xz8WIE8ksCJVM4A5gH5ehc8SFW4dpWPyObffaE" alt="Dipak Kadam" className="profile-img" />
                        </div>
                    </div>
                </div>
            </section>
        );

        /* --- SKILLS SECTION --- */
        const Skills = () => {
            const skillSets = [
                {
                    icon: "fa-code",
                    title: "Web Engineering",
                    desc: "Responsive, high-performance web solutions.",
                    tags: ["React.js", "JavaScript (ES6)", "HTML5/CSS3", "JSON"]
                },
                {
                    icon: "fa-project-diagram",
                    title: "Zoho Architecture",
                    desc: "End-to-end business process automation.",
                    tags: ["Zoho CRM", "Zoho Flow", "Deluge Script", "Webhooks", "REST API"]
                },
                {
                    icon: "fa-brain",
                    title: "AI & Intelligence",
                    desc: "Integrating LLMs and automation tools.",
                    tags: ["ChatGPT API", "GitHub Copilot", "Chatbots", "Automated Testing"]
                },
                {
                    icon: "fa-server",
                    title: "System Infra",
                    desc: "Secure, scalable server management.",
                    tags: ["Linux Admin", "Windows Server", "Zabbix/Grafana", "Python"]
                }
            ];

            return (
                <section id="skills" className="section-padding">
                    <div className="container">
                        <div className="mono" style={{marginBottom:'10px'}}>// Technical_Arsenal</div>
                        <h2 style={{fontSize:'2.5rem', marginBottom:'50px'}}>Engineering Competence</h2>
                        
                        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))', gap:'24px'}}>
                            {skillSets.map((skill, i) => (
                                <div key={i} className="glass-card">
                                    <i className={`fas ${skill.icon}`} style={{fontSize:'2rem', color:'var(--accent-primary)', marginBottom:'20px'}}></i>
                                    <h3 style={{fontSize:'1.25rem', marginBottom:'10px'}}>{skill.title}</h3>
                                    <p style={{color:'var(--text-muted)', marginBottom:'20px', fontSize:'0.9rem'}}>{skill.desc}</p>
                                    <div>
                                        {skill.tags.map(tag => <span key={tag} className="skill-tag">{tag}</span>)}
                                    </div>

                            ))}

                    </div>
                </section>
            );
        };

        /* --- EXPERIENCE SECTION --- */
        const Experience = () => {
            // Data extracted from PDF
            const jobs = [
                {

                    company: "ZM Technologies",
                    date: "Sep 2025 - Present",
                    desc: [

                        "Designing Website-to-Zoho integrations (CRM, Flow, API) for lead capture.",
                        "Automating workflow execution using Webhooks and REST APIs.",
                        "Ensuring cross-browser compatibility and secure API usage."
                    ]
                },
                {
                    role: "System Engineer",
                    company: "Royaltech",
                    date: "Apr 2025 - Sep 2025",
                    desc: [
                        "Designed scalable IT environments focusing on high availability.",
                        "Implemented monitoring via Grafana & Zabbix to prevent failures.",
                        "Automated admin tasks using Python and Bash scripting.",
                        "Managed security hardening and performance tuning."
                    ]
                },
                {
                    role: "IT Administrator",
                    company: "SKS Engineering Solutions",
                    date: "Jul 2024 - Mar 2025",
                    desc: [
                        "Managed infrastructure, access control, and user permissions.",
                        "Executed disaster recovery operations and system patching.",
                        "Provided technical support and troubleshooting for networks."
                    ]
                }
            ];

            return (
                <section id="experience" className="section-padding" style={{background:'rgba(255,255,255,0.02)'}}>
                    <div className="container">
                        <div className="mono" style={{marginBottom:'10px'}}>// Career_Trajectory</div>
                        <h2 style={{fontSize:'2.5rem', marginBottom:'50px'}}>Professional Experience</h2>
                        
                        <div style={{maxWidth:'800px'}}>
                            {jobs.map((job, i) => (
                                <div key={i} className="timeline-item">
                                    <h3 style={{fontSize:'1.5rem', marginBottom:'5px'}}>{job.role}</h3>
                                    <div style={{color:'var(--accent-primary)', fontWeight:'600', marginBottom:'5px'}}>{job.company}</div>
                                    <div className="mono" style={{color:'var(--text-muted)', fontSize:'0.85rem', marginBottom:'15px'}}>{job.date}</div>
                                    <ul style={{listStyle:'none', color:'var(--text-muted)'}}>
                                        {job.desc.map((d, index) => (
                                            <li key={index} style={{marginBottom:'8px', display:'flex'}}>
                                                <span style={{color:'var(--accent-secondary)', marginRight:'10px'}}>➤</span>
                                                {d}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        /* --- FOOTER / CONTACT --- */
        const Footer = () => (
            <footer id="contact" style={{borderTop:'1px solid var(--border-glass)', padding:'60px 0', textAlign:'center'}}>
                <div className="container">
                    <h2 style={{fontSize:'2.5rem', marginBottom:'30px'}}>Ready to Collaborate?</h2>
                    <p style={{color:'var(--text-muted)', marginBottom:'40px'}}>
                        Available for AI Integration, Zoho Automation, and Web Development projects.
                    </p>
                    
                    <div style={{display:'flex', justifyContent:'center', gap:'30px', marginBottom:'50px'}}>
                        <a href="mailto:dipak100kadam@gmail.com" className="glass-card" style={{padding:'20px', textDecoration:'none', color:'white'}}>
                            <i className="fas fa-envelope" style={{marginBottom:'10px', fontSize:'1.5rem', color:'var(--accent-primary)'}}></i>
                            <div>dipak100kadam@gmail.com</div>
                        </a>
                        <a href="tel:+917057807659" className="glass-card" style={{padding:'20px', textDecoration:'none', color:'white'}}>
                            <i className="fas fa-phone" style={{marginBottom:'10px', fontSize:'1.5rem', color:'var(--accent-primary)'}}></i>
                            <div>+91 7057 807 659</div>
                        </a>
                    </div>

                    <div style={{color:'var(--text-muted)', fontSize:'0.9rem'}}>
                        &copy; 2026 Dipak Kadam. Engineered with React & Mathematics.
                    </div>
                </div>
            </footer>
        );

        /* --- MAIN APP --- */
        const App = () => {
            return (
                <React.Fragment>
                    <NeuralBackground />
                    <Navbar />
                    <Hero />
                    <Skills />
                    <Experience />
                    <Footer />
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
